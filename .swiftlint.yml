included:
  - Sources
  - Tests

excluded:
  - .build
  - Package.swift

disabled_rules:
  - identifier_name                  # short names (tg, b, c, w) are idiomatic in closures/task groups
  - optional_data_string_conversion  # false positive: flags String(decoding:as:) which is non-optional
  - for_where                        # `where` doesn't support `await`; async for-in loops can't use it

opt_in_rules:
  - empty_count
  - closure_spacing
  - operator_usage_whitespace
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - empty_enum_arguments

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 7
  error: 10
