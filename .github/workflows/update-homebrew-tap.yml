name: Update Homebrew Tap

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256
        id: sha
        run: |
          sha=$(curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz" | shasum -a 256 | awk '{print $1}')
          echo "value=$sha" >> $GITHUB_OUTPUT

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: tideline-studio/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          version="${{ github.ref_name }}"
          sha="${{ steps.sha.outputs.value }}"
          sed -i "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/refs/tags/${version}.tar.gz\"|" Formula/agent-lens.rb
          sed -i "s|sha256 \".*\"|sha256 \"${sha}\"|" Formula/agent-lens.rb

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          version="${{ github.ref_name }}"
          branch="update/agent-lens-${version}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper ""
          git checkout -b "$branch"
          git add Formula/agent-lens.rb
          git commit -m "Update agent-lens to ${version}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/tideline-studio/homebrew-tap.git" "$branch"
          gh pr create \
            --repo tideline-studio/homebrew-tap \
            --title "Update agent-lens to ${version}" \
            --body "Automated formula update for version \`${version}\`.

          - URL: \`https://github.com/${{ github.repository }}/archive/refs/tags/${version}.tar.gz\`
          - SHA-256: \`${{ steps.sha.outputs.value }}\`" \
            --base main \
            --head "$branch"
